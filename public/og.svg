<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF8F2"/>
      <stop offset="60%" stop-color="#F6F1E7"/>
      <stop offset="100%" stop-color="#EFE7D5"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#C9A875" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A875" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A875" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A875" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative arches -->
  <path d="M150 630 V330 a450 450 0 0 1 900 0 V630" fill="none" stroke="url(#arch)" stroke-width="1.2"/>
  <path d="M260 630 V380 a340 340 0 0 1 680 0 V630" fill="none" stroke="url(#arch)" stroke-width="1.2"/>

  <!-- Wordmark -->
  <text x="600" y="300" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="120" letter-spacing="14" fill="#1F3B33">LUSTRE</text>
  <text x="600" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" letter-spacing="16" fill="#1F3B33" opacity="0.7">S P A</text>

  <!-- Tagline -->
  <line x1="500" y1="430" x2="700" y2="430" stroke="#1F3B33" stroke-opacity="0.3"/>
  <text x="600" y="475" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-style="italic" fill="#1F3B33" opacity="0.85">The Art of Quiet Luxury</text>
  <text x="600" y="525" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" letter-spacing="6" fill="#1F3B33" opacity="0.6">JEDDAH · AL NAEEM</text>
</svg>
