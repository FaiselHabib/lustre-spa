<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Lustre Spa — Luxury Women's Spa in Jeddah">
  <defs>
    <!-- Soft ivory → champagne wash -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF8F2"/>
      <stop offset="55%" stop-color="#F6F1E7"/>
      <stop offset="100%" stop-color="#E5D9BD"/>
    </linearGradient>

    <!-- Champagne ambient glows -->
    <radialGradient id="glowL" cx="18%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#C9A875" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#C9A875" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="92%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#E7CFC4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E7CFC4" stop-opacity="0"/>
    </radialGradient>

    <!-- Arch stroke gradient -->
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9C7E50" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#C9A875" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#C9A875" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom ivory fade for legibility -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FBF8F2" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Subtle vertical edge vignette -->
    <linearGradient id="vEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F3B33" stop-opacity="0.08"/>
      <stop offset="10%" stop-color="#1F3B33" stop-opacity="0"/>
      <stop offset="90%" stop-color="#1F3B33" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1F3B33" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Hairline filigree -->
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.5" fill="#1F3B33" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Layered background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>

  <!-- Architectural arches (Lustre signature) -->
  <g stroke-linecap="round" fill="none">
    <path d="M120 630 V315 a480 480 0 0 1 960 0 V630" stroke="url(#arch)" stroke-width="1.2"/>
    <path d="M230 630 V365 a370 370 0 0 1 740 0 V630" stroke="url(#arch)" stroke-width="1"/>
    <path d="M340 630 V410 a260 260 0 0 1 520 0 V630" stroke="url(#arch)" stroke-width="0.8"/>
  </g>

  <!-- Filigree dots on outermost arch -->
  <path d="M120 315 a480 480 0 0 1 960 0" fill="none" stroke="url(#dots)" stroke-width="14" opacity="0.4"/>

  <!-- Bottom luminous fade -->
  <rect y="280" width="1200" height="350" fill="url(#fade)"/>
  <rect width="1200" height="630" fill="url(#vEdge)"/>

  <!-- Top eyebrow rule -->
  <line x1="540" y1="118" x2="600" y2="118" stroke="#1F3B33" stroke-opacity="0.35"/>
  <text x="600" y="124" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" letter-spacing="6" font-weight="500" fill="#1F3B33" fill-opacity="0.7">
    JEDDAH · AL NAEEM
  </text>
  <line x1="600" y1="118" x2="660" y2="118" stroke="#1F3B33" stroke-opacity="0.35"/>

  <!-- Wordmark -->
  <text x="600" y="305" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="148" letter-spacing="18" font-weight="500" fill="#152821">
    LUSTRE
  </text>

  <!-- Sub-wordmark with side rules -->
  <line x1="475" y1="358" x2="555" y2="358" stroke="#1F3B33" stroke-opacity="0.4"/>
  <text x="600" y="365" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" letter-spacing="22" font-weight="400" fill="#1F3B33" fill-opacity="0.75">
    S P A
  </text>
  <line x1="645" y1="358" x2="725" y2="358" stroke="#1F3B33" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-style="italic" font-size="36" font-weight="400" fill="#1F3B33" fill-opacity="0.85">
    The Art of Quiet Luxury
  </text>

  <!-- Bilingual tagline (Arabic) -->
  <text x="600" y="498" text-anchor="middle"
        font-family="'Cairo', 'Tajawal', 'Noto Sans Arabic', sans-serif"
        font-size="24" font-weight="500" fill="#1F3B33" fill-opacity="0.7">
    فنّ الفخامة الهادئة
  </text>

  <!-- Footer line: address -->
  <line x1="400" y1="552" x2="800" y2="552" stroke="#1F3B33" stroke-opacity="0.18"/>
  <text x="600" y="582" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" letter-spacing="4" font-weight="500" fill="#1F3B33" fill-opacity="0.6">
    JASMIN GARDEN HOTEL  ·  AL NAEEM, JEDDAH
  </text>

  <!-- Champagne diamond accents -->
  <rect x="596" y="525" width="8" height="8" transform="rotate(45 600 529)" fill="#C9A875"/>
  <rect x="384" y="548" width="6" height="6" transform="rotate(45 387 551)" fill="#C9A875" fill-opacity="0.55"/>
  <rect x="810" y="548" width="6" height="6" transform="rotate(45 813 551)" fill="#C9A875" fill-opacity="0.55"/>
</svg>
